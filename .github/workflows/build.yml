name: Build and Release Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # این دسترسی برای اینه که اکشن بتونه تو گیت‌هابت ریلیز بسازه
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --clean deploy.py
        
    - name: Create Release and Upload EXE
      uses: softprops/action-gh-release@v2
      with:
        # ساخت یک تگ و اسم داینامیک بر اساس شماره اجرای اکشن
        tag_name: v1.0.${{ github.run_number }}
        name: Zeus Panel Deployer v1.0.${{ github.run_number }}
        files: dist/deploy.exe
        draft: false
        prerelease: false
